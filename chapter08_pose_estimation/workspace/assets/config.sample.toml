# ============================================================
# config.sample.toml
# ------------------------------------------------------------
# アプリケーション設定サンプル。
# このファイルを config.toml としてアプリと同じディレクトリに置く。
# ============================================================

# カメラ設定
[camera]
id = 0  # 0 = 内蔵カメラ, 1 = 外部カメラ

# HSV 色域（青系）
# H: 0-179, S: 0-255, V: 0-255 (OpenCV の HSV スケール)
[hsv]
lower = [100, 80, 80]   # HSV 下限値
upper = [130, 255, 255] # HSV 上限値

# OSC 送信設定
[osc]
host = "127.0.0.1"  # 送信先ホスト (Max/MSP が動作する同一ホストが一般的)
port = 9000          # 送信先ポート
